<!DOCTYPE html>
<html>
<head>
    <title>Banking System - Reset Password</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .alert { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .alert-success { background-color: #d4edda; color: #155724; }
        .alert-error { background-color: #f8d7da; color: #721c24; }
        form div { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; }
        button { padding: 8px 15px; }
    </style>
</head>
<body>
    <h1>Reset Password</h1>
    <a href="{{ url_for('home') }}">Back to Home</a>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" action="{{ url_for('reset_password_page') }}">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="new_password">New Password (numbers only):</label>
            <input type="password" id="new_password" name="new_password" required>
        </div>
        <div>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit">Reset Password</button>
    </form>
    
    <p>Remember your password? <a href="{{ url_for('login') }}">Login here</a></p>
</body>
</html>
